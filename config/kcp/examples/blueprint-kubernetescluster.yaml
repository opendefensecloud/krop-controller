# config/kcp/examples/blueprint-kubernetescluster.yaml
# Operator-facing copy. Kept identical to internal/engine/embedded/blueprint-kubernetescluster.yaml (the compiled-in copy) until M4 removes the embedded copy.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: kubernetescluster
spec:
  schema:
    apiVersion: v1alpha1
    kind: KubernetesCluster
    group: krop.opendefense.cloud
    spec:
      region: string
    status:
      configMapName: ${config.metadata.name}
      agentToken: ${agentRequest.status.token}
  resources:
    - id: agentRequest
      template:
        apiVersion: fulfil.krop.opendefense.cloud/v1alpha1
        kind: AgentRequest
        metadata:
          name: ${schema.spec.region}-agent
          namespace: default
          annotations:
            krop.opendefense.cloud/target: provider
        spec:
          region: ${schema.spec.region}
    - id: config
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.region}-cluster-config
          namespace: default
          annotations:
            krop.opendefense.cloud/target: consumer
        data:
          region: ${schema.spec.region}
          token: ${agentRequest.status.token}
