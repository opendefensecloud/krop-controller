name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write # for keyless cosign sign-blob
  attestations: write # for build-provenance attestation

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Extract go version from flake.nix
        id: get-go-version
        run: |
          GO_VERSION="$(sed -nE 's/^[[:space:]]*goVersion[[:space:]]*=[[:space:]]*"([0-9]+\.[0-9]+\.[0-9]+)";[[:space:]]*$/\1/p' flake.nix)"
          if [ "$(printf '%s\n' "$GO_VERSION" | sed '/^$/d' | wc -l)" -ne 1 ]; then
            echo "::error::Expected exactly one goVersion assignment in flake.nix"
            exit 1
          fi
          echo "version=$GO_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ steps.get-go-version.outputs.version }}
          cache: true

      - name: Run tests
        run: make test

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          for os in linux darwin; do
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=${os} GOARCH=${arch} \
                go build -ldflags "${LDFLAGS}" \
                -o bin/krop-controller-${os}-${arch} ./cmd/controller
            done
          done

      - name: Create checksums
        run: |
          find bin -type f ! -name checksums.txt | sort | xargs sha256sum > bin/checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: 'bin/krop-controller-*' # binaries only; runs before signing so bundles are not yet present

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artefacts (keyless)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cd bin
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sigstore.json) continue ;; esac
            # Emit a Sigstore bundle (signature + cert + Rekor proof), named
            # *.sigstore.json so OpenSSF Scorecard's Signed-Releases check
            # detects it.
            cosign sign-blob --yes \
              --new-bundle-format=true \
              --bundle "${f}.sigstore.json" \
              "$f"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            bin/*
          generate_release_notes: true
          # Immutable releases forbid uploading assets to an already-published
          # release, so create a draft with the signed artefacts attached and
          # publish it separately (UI, or `gh release edit <tag> --draft=false`).
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
