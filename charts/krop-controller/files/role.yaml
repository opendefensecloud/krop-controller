# ClusterRole rules for krop-controller's PROVIDER-WORKSPACE operations.
#
# krop's runtime authorization is mostly NOT static RBAC: instance reconciliation
# across consumer workspaces flows through the published APIExport identity +
# permissionClaims on the virtual workspace. The rules below cover the operations
# the controller performs directly in its own provider workspace:
#   - watching the ResourceGraphDefinition blueprints and writing their status,
#   - upserting the kcp apis.kcp.io objects it compiles blueprints into,
#   - creating/listing/deleting the provider-target child objects it applies.
rules:
  # Blueprint watch: the Registrar watches cluster-scoped
  # ResourceGraphDefinitions in the provider workspace.
  - apiGroups:
      - krop.opendefense.cloud
    resources:
      - resourcegraphdefinitions
    verbs:
      - get
      - list
      - watch
  # Blueprint status + finalizers: the Registrar records publish status and
  # manages the blueprint finalizer.
  - apiGroups:
      - krop.opendefense.cloud
    resources:
      - resourcegraphdefinitions/status
      - resourcegraphdefinitions/finalizers
    verbs:
      - get
      - update
      - patch
  # kcp apis group: the Registrar compiles each blueprint into an
  # APIResourceSchema + APIExport (v1alpha1 and v1alpha2 share the apis.kcp.io
  # apiGroup), auto-discovers the APIExportEndpointSlice, and lists APIBindings
  # to resolve claim identities.
  - apiGroups:
      - apis.kcp.io
    resources:
      - apiexports
      - apiexports/status
      - apiresourceschemas
      - apiexportendpointslices
      - apiexportendpointslices/status
      - apibindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Provider-target children applied by the engine. The reconciler
  # server-side-applies ConfigMaps and lists/deletes arbitrary provider-target
  # GVKs declared by a blueprint. Because those GVKs are blueprint-defined and
  # thus not known at chart-install time, this grants a broad rule.
  #
  # DEPLOYMENT-SPECIFIC: operators SHOULD replace this "*"/"*" rule with tightly
  # scoped rules enumerating exactly the apiGroups/resources their blueprints
  # emit. It is intentionally broad here so a fresh install functions; narrow it
  # for production.
  - apiGroups:
      - "*"
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
