apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "krop-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "krop-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "krop-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "krop-controller.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "krop-controller.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: {{ include "krop-controller.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.controller.extraArgs }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.kcp.kubeconfigSecret.name }}
          env:
            - name: KUBECONFIG
              value: /etc/kcp/{{ .Values.kcp.kubeconfigSecret.key }}
          {{- end }}
          ports:
            - name: health
              containerPort: {{ include "krop-controller.healthPort" . }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.kcp.kubeconfigSecret.name }}
            - name: kcp-kubeconfig
              mountPath: /etc/kcp
              readOnly: true
            {{- end }}
      {{- if .Values.kcp.kubeconfigSecret.name }}
      volumes:
        - name: kcp-kubeconfig
          secret:
            secretName: {{ .Values.kcp.kubeconfigSecret.name }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
