# krop-controller Helm chart values

# -- Image configuration for krop-controller
image:
  repository: ghcr.io/opendefensecloud/krop-controller
  # -- Overrides the image tag (default is the chart appVersion)
  tag: "@sha256:75bd8b3195cfa1ebc483cf45e78650eda24264583ca150fa0d4320efbb744f54"
  pullPolicy: IfNotPresent

# -- Image pull secrets (list of secret names)
imagePullSecrets: []

# -- Override the full name of resources
fullnameOverride: ""

# -- Override the chart name
nameOverride: ""

# -- Number of replicas. Set >1 only together with controller.leaderElect=true
# so exactly one manager is active at a time; otherwise keep this at 1.
replicaCount: 1

# -- ServiceAccount for the controller pod.
#
# The chart deliberately creates NO Kubernetes ClusterRole/ClusterRoleBinding in
# the HOSTING (kind/management) cluster. krop-controller performs all of its
# business logic against kcp via a mounted, workspace-scoped kubeconfig (see
# `kcp.kubeconfigSecret` below) — NOT against the hosting cluster's API. Its
# real authority lives in kcp and is expressed as kcp-native RBAC bound to the
# identity `system:serviceaccount:<namespace>:<serviceaccount>` (apply the
# fixtures in config/kcp/rbac/ into the target kcp workspaces). The pod only
# needs its ServiceAccount to mount the kubeconfig Secret. See docs/permissions.md.
serviceAccount:
  # -- Create a ServiceAccount for the controller
  create: true
  # -- Override the ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# -- Controller runtime configuration.
#
# These keys are rendered into the container's args as the binary's operability
# flags: --health-probe-bind-address, --metrics-bind-address and (when enabled)
# --leader-elect. healthProbeBindAddress ALSO derives the container/probe port.
# Metrics are served ONLY by the single provider manager on metricsBindAddress
# (the per-blueprint instance managers keep metrics disabled to avoid a port
# collision). Use `extraArgs` for any additional flags (e.g. --zap-log-level,
# --zap-devel, --leader-election-namespace).
controller:
  # -- Health probe bind address (healthz/readyz). Also derives the probe/container port.
  healthProbeBindAddress: ":8081"
  # -- Provider manager metrics bind address. Set to "0" to disable metrics.
  metricsBindAddress: ":8080"
  # -- Enable leader election (renders --leader-elect). Required for HA (replicaCount>1);
  # creates a coordination.k8s.io Lease in the provider workspace.
  leaderElect: false
  # -- Additional CLI args passed verbatim to the manager container.
  extraArgs: []

# -- kcp provider-workspace wiring.
#
# krop-controller connects to a kcp PROVIDER WORKSPACE via a workspace-scoped
# kubeconfig. The binary calls ctrl.GetConfigOrDie(), which honors the KUBECONFIG
# env var (and otherwise falls back to in-cluster / default config). For a real
# kcp deployment you MUST point it at a workspace: provide a Secret (out-of-band)
# containing a workspace-scoped kubeconfig and reference it here. When
# kubeconfigSecret.name is set, the chart mounts that Secret at /etc/kcp and sets
# KUBECONFIG=/etc/kcp/<key>. When empty, the controller runs with in-cluster /
# default config (no mount) — which is NOT workspace-scoped and will fail the
# binary's ValidateKubeconfig check against a real kcp front-proxy.
kcp:
  kubeconfigSecret:
    # -- Name of the Secret holding the workspace-scoped kubeconfig. Leave empty
    # to run with in-cluster/default config (not suitable for real kcp use).
    name: ""
    # -- Key within the Secret that holds the kubeconfig.
    key: "kubeconfig"

# -- Host cluster wiring for the `host` routing target.
#
# Resources with `target: host` are written into the PHYSICAL host cluster the
# controller pod runs in. By default (kubeconfigSecret.name empty) the binary
# uses in-cluster config — the pod's own ServiceAccount against the cluster it
# runs in — and NO --host-kubeconfig flag is rendered. When kubeconfigSecret.name
# is set, the chart mounts that Secret at /etc/host-kubeconfig and renders
# --host-kubeconfig=/etc/host-kubeconfig/<key> so the host target points at a
# DISTINCT cluster (or an out-of-cluster/dev run).
#
# NOTE: host-cluster RBAC is the PROVIDER's responsibility and out of krop's
# least-privilege scope — the in-cluster default needs NO host ClusterRole from
# this chart (tier (e) in docs/permissions.md). If neither in-cluster config nor
# this Secret yields a config, the host target is DISABLED and blueprints routing
# to `host` fail loudly (fail-closed).
hostKubeconfig:
  kubeconfigSecret:
    # -- Name of the Secret holding the host-cluster kubeconfig. Leave empty to
    # use in-cluster config (the pod's own cluster) for the host target.
    name: ""
    # -- Key within the Secret that holds the host kubeconfig.
    key: "kubeconfig"

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL

# -- Resource requests and limits
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 128Mi

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}
