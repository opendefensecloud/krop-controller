# test/fixtures/crd-instance-generic.yaml
# A permissive instance CRD, parameterized by ${GROUP}/${PLURAL}/${SINGULAR}/
# ${KIND}/${LISTKIND}, that stands in for the CRD kro's SynthesizeCRD would
# generate from a blueprint's Schema. The e2e installs it in the consumer
# workspace so instances can be created and their (CEL-projected) status written
# back. spec/status use preserve-unknown-fields because the reconciler drives the
# instance schema from the compiled graph, not from this served CRD.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ${PLURAL}.${GROUP}
spec:
  group: ${GROUP}
  scope: Namespaced
  names:
    plural: ${PLURAL}
    singular: ${SINGULAR}
    kind: ${KIND}
    listKind: ${LISTKIND}
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
