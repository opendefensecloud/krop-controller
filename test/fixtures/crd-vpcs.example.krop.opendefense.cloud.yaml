# test/fixtures/crd-vpcs.example.krop.opendefense.cloud.yaml
# A status-bearing "VPC" CRD used by the external-ref e2e: the blueprint reads
# an existing Vpc via externalRef and funnels ${vpc.status.vpcId} into a child.
# The status schema is explicit (not preserve-unknown) so kro's graph builder can
# type-check ${vpc.status.vpcId} at build time.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vpcs.example.krop.opendefense.cloud
spec:
  group: example.krop.opendefense.cloud
  scope: Namespaced
  names:
    plural: vpcs
    singular: vpc
    kind: Vpc
    listKind: VpcList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                cidr:
                  type: string
            status:
              type: object
              properties:
                vpcId:
                  type: string
