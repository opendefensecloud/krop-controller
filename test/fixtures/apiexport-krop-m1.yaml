apiVersion: apis.kcp.io/v1alpha2
kind: APIExport
metadata:
  name: kubernetesclusters.krop.opendefense.cloud
spec:
  resources:
  - group: krop.opendefense.cloud
    name: kubernetesclusters
    schema: v1alpha1.kubernetesclusters.krop.opendefense.cloud
    storage:
      crd: {}
  # The consumer-target ConfigMap is written through the APIExport virtual
  # workspace as the APIExport identity, so M2 claims core configmaps here; the
  # consumer's APIBinding must accept it (test/fixtures/apibinding-*.yaml).
  permissionClaims:
    - group: ""
      resource: configmaps
      verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
